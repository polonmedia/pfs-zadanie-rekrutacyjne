<mat-card>
  <mat-card-title>Zaloguj się</mat-card-title>
  <mat-card-content>
    <form [formGroup]="loginFormGroup" (ngSubmit)="submitLoginForm()" class="login-form">
      <mat-form-field>
        <input matInput placeholder="Login" formControlName="loginControl" required>
      </mat-form-field>

      <mat-form-field>
        <input matInput placeholder="Hasło" type="password" formControlName="passwordControl">
      </mat-form-field>

      <div class="button">
        <button mat-raised-button color="primary" type="submit">Loguj</button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
